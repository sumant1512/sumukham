<div class="login-screen">
  <div class="container">
    <div class="row">
      <div class="col-md-2 col-lg-4"></div>
      <div class="col-md-8 col-lg-4">
        <div class="login-wrapper">
          <div class="login-card shadow">
            <div class="brand-header">
              <img class="img-fluid" src="golden_logo.png" alt="" />
            </div>

            <div class="p-4">
              <p class="mb-3 form-heading">
                <ng-container *ngIf="!isVerifyPage">
                  <span>Login</span> or <span>Signup</span>
                </ng-container>
                <ng-container *ngIf="isVerifyPage">
                  <span>Verify OTP</span>
                </ng-container>
              </p>

              <form *ngIf="!isVerifyPage" [formGroup]="loginForm">
                <!-- Mobile -->
                <div class="mb-3">
                  <div class="input-group">
                    <select
                      class="form-select country-code-select"
                      formControlName="countryCode"
                      style="max-width: 90px"
                    >
                      <option value="+91">+91</option>
                      <option value="+1">+1</option>
                      <option value="+44">+44</option>
                    </select>
                    <input
                      type="text"
                      class="form-control mobile-input"
                      placeholder="Mobile Number"
                      formControlName="mobile"
                    />
                  </div>

                  <div
                    class="text-danger small mt-1"
                    *ngIf="mobile?.invalid && mobile?.touched"
                  >
                    Enter valid mobile number
                  </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <input
                    type="email"
                    class="p-3 email-input"
                    placeholder="Email"
                    formControlName="email"
                  />
                  <div
                    class="text-danger small mt-1"
                    *ngIf="email?.invalid && email?.touched"
                  >
                    Enter valid email
                  </div>
                </div>

                <!-- Terms -->
                <div class="form-check mb-4 btn-space">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms"
                    formControlName="terms"
                  />
                  <label class="form-check-label small" for="terms">
                    By continuing, I agree to the
                    <a href="#">Terms of use</a> &
                    <a href="#">Privacy Policy</a> and I am above 18 years old.
                  </label>
                </div>
              </form>

              <form [formGroup]="otpForm">
                <div *ngIf="isVerifyPage" class="mt-3 row">
                  <div
                    class="col-2 px-1"
                    *ngFor="let ctrl of otpControls; let i = index"
                  >
                    <input
                      type="text"
                      maxlength="1"
                      class="otp-box"
                      [formControlName]="ctrl"
                      (keyup)="onKeyUp($event, i)"
                      (paste)="onPaste($event)"
                    />
                  </div>
                </div>
              </form>

              <p class="mt-3 form-heading">
                <ng-container *ngIf="isVerifyPage">
                  <span>Resend OTP</span>
                </ng-container>
              </p>

              <button
                type="submit"
                [ngClass]="isVerifyPage ? 'btn-space' : ''"
                [disabled]="isVerifyPage ? otpForm.invalid : loginForm.invalid"
                (click)="onClick()"
                class="custom-btn w-100 continue-btn"
              >
                {{ isVerifyPage ? "Verify" : "Continue" }}
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-2 col-lg-4"></div>
    </div>
  </div>
</div>
