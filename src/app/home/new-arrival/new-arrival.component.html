<section class="mt-5">
  <div class="mt-5">
    <p class="sumukham-h-1">New Arrivals</p>
  </div>

  <div>
    <div class="card-container">
      <ng-container *ngFor="let product of products">
        <app-product-card [product]="product"></app-product-card>
      </ng-container>
    </div>
    <div class="text-center mt-4">
      <button class="custom-btn" [routerLink]="['/products']">Show All Products</button>
    </div>
  </div>
</section>
