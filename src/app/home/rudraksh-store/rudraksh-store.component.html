<section class="mt-5">
  <div class="mt-5 mb-3 justify-content-between d-flex align-items-center">
    <p class="sumukham-h-1">Rudraksha Store</p>
    <button class="custom-btn" [routerLink]="['/products']" [queryParams]="{ category: 'rudraksha' }">Explore All</button>
  </div>

  <div class="rudraksh-banner">
    <div class="row">
      <div class="col-lg-6 d-none d-lg-block">
        <img src="rudraksh_b2.png" alt="Background" class="img-back" />
        <img src="rudraksh_b1.png" alt="Foreground" class="img-front" />
      </div>
      <div
        class="col-12 col-lg-6 text-center text-lg-end rudraksh-banner-section p-4 pe-4 pe-lg-5"
      >
        <p class="sumukham-h-1 rudraksh-banner-heading">Rudraksha</p>

        <p class="sumukham-p-1 rudraksh-banner-content">
          Rudraksha, the sacred seed of Lord Shiva, carries divine energy and
          protection. Each bead at Sumukham is pure, authentic, and energized.
          Wear it to invite peace, strength, and spiritual growth into your
          life.
        </p>
      </div>
    </div>
  </div>

  <div>
    <div class="card-container">
      <ng-container *ngFor="let product of products">
        <app-product-card [product]="product"></app-product-card>
      </ng-container>
    </div>
  </div>
</section>
